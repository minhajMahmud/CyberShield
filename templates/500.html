{% extends "base.html" %}
{% block title %}Server Error{% endblock %}
{% block content %}
<div class="container py-5 text-center">
  <i class="bi bi-exclamation-octagon-fill" style="font-size: 6rem; color: var(--cs-accent);"></i>
  <h1 class="fw-bold mt-3">500 - Something Went Wrong</h1>

</div>
{% endblock %}
