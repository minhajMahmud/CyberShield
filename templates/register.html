{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="container py-5" style="max-width: 520px;">
  <div class="cs-card p-4">
    <h2 class="fw-bold text-center mb-4"><i class="bi bi-person-plus-fill cs-text-accent"></i> Create Account</h2>
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" name="full_name">
      </div>
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" class="form-control" name="username" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" name="email" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password" required oninput="cybershieldLivePasswordHint()">
        <div id="passwordHint" class="form-text"></div>
      </div>
      <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-control" name="confirm_password" required>
      </div>
      <button type="submit" class="btn btn-cs-accent w-100 mb-3">Register</button>
    </form>
    <p class="text-center small text-muted mb-0">
      Already have an account? <a href="{{ url_for('auth.login') }}">Login here</a>
    </p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/password_checker.js') }}"></script>
<script>
async function cybershieldLivePasswordHint() {
  const pwd = document.getElementById('password').value;
  const hint = document.getElementById('passwordHint');
  if (!pwd) { hint.textContent = ''; return; }
  const result = await cybershieldCheckPassword(pwd);
  hint.textContent = `Strength: ${result.label} (${result.score}/100)`;
}
</script>
{% endblock %}
